version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels: ["dependencies", "github-actions"]
    reviewers: ["owner"]
    open-pull-requests-limit: 10
