name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Release on PHP ${{ matrix.php-version }} (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        php-version:
          - '8.4'
    steps:
      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.TURNMARK_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate Changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS="$(git log ${LAST_TAG}..HEAD --pretty='- %s')"
          else
            COMMITS="$(git log --pretty='- %s')"
          fi

          awk -v commits="$COMMITS" '
            /^## Unreleased$/ {
              print
              print ""
              print commits
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG_NEW.md

          mv CHANGELOG_NEW.md CHANGELOG.md

      - name: Release Packages
        run: vendor/bin/monorepo-builder release ${{ github.event.inputs.version }}

      - name: Restore Unreleased
        run: |
          if ! grep -q '^## Unreleased$' CHANGELOG.md; then
            awk '
              /^# Changelog$/ {
                print
                print ""
                print "## Unreleased"
                print ""
                next
              }
              { print }
            ' CHANGELOG.md > CHANGELOG_NEW.md

            mv CHANGELOG_NEW.md CHANGELOG.md
          fi

          git add CHANGELOG.md

          if ! git diff --cached --quiet; then
            git commit -m "chore: update CHANGELOG.md"
            git push
          fi
