name: Split

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  split:
    name: Split ${{ matrix.package.name }} (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package:
          - name: scraper
            path: packages/scraper
          - name: scraper-fukuoka
            path: packages/scraper-fukuoka
          - name: scraper-tokuyama
            path: packages/scraper-tokuyama
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.TURNMARK_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Subtree Commit
        id: split
        run: |
          SHA=$(
            git subtree split \
              --prefix=${{ matrix.package.path }}
          )

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Split SHA: $SHA"

      - name: Push Branch
        env:
          GH_TOKEN: ${{ secrets.TURNMARK_ACCESS_TOKEN }}
        run: |
          REPO=${{ matrix.package.name }}
          SHA=${{ steps.split.outputs.sha }}
          REMOTE=https://github.com/turnmark/${REPO}.git

          git fetch "${REMOTE}" main || true
          git push "${REMOTE}" "${SHA}:refs/heads/main" --force

      - name: Push Tag
        env:
          GH_TOKEN: ${{ secrets.TURNMARK_ACCESS_TOKEN }}
        run: |
          REPO=${{ matrix.package.name }}
          SHA=${{ steps.split.outputs.sha }}
          REMOTE=https://github.com/turnmark/${REPO}.git

          if git ls-remote --tags "${REMOTE}" "refs/tags/${TAG}" | grep -q .; then
            echo "Tag already exists."
            exit 0
          fi

          git tag -d "${TAG}" 2>/dev/null || true
          git tag -a "${TAG}" "${SHA}" -m "${TAG}"
          git push "${REMOTE}" "refs/tags/${TAG}"
          git tag -d "${TAG}"
