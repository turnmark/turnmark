name: Split

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  split:
    name: Split ${{ matrix.package }} (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package:
          - scraper
          - scraper-fukuoka
          - scraper-tokuyama
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.TURNMARK_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Split and Push ${{ matrix.package }}
        env:
          GITHUB_TOKEN: ${{ secrets.TURNMARK_ACCESS_TOKEN }}
        uses: danharrin/monorepo-split-github-action@v2.4.0
        with:
          package_directory: packages/${{ matrix.package }}
          repository_organization: turnmark
          repository_name: ${{ matrix.package }}
          branch: main
          tag: ${{ github.ref_name }}
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

      - name: Create Release ${{ matrix.package }}
        env:
          GH_TOKEN: ${{ secrets.TURNMARK_ACCESS_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "turnmark/${{ matrix.package }}" 2>/dev/null; then
            echo 'Release already exists.'
            exit 0
          fi

          gh release create "${{ github.ref_name }}" \
            --repo "turnmark/${{ matrix.package }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --notes "
              ## Package

              ${{ matrix.package }}

              This package is automatically split from the monorepo.

              Install:

              \`\`\`bash
              composer require turnmark/${{ matrix.package }}
              \`\`\`
            "
